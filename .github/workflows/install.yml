name: Multi-Distribution Installation Test

on:
  push:
    branches:
      - master
      - next
  workflow_dispatch:

permissions:
  contents: read

jobs:
  make-install:
    name: Test 'make install' on ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Test all distros even if one fails
      matrix:
        include:
          # Ubuntu/Debian family
          - distro: "ubuntu:26.04"
            name: "Ubuntu 26.04 LTS"
            pre_install: "apt-get update"
            install_deps: "apt-get install -y sudo systemd libcairo2-dev libcurl4-openssl-dev build-essential pkg-config libjansson-dev fonts-roboto file"

          - distro: "debian:13"
            name: "Debian 13 (Trixie)"
            pre_install: "apt-get update"
            install_deps: "apt-get install -y sudo systemd libcairo2-dev libcurl4-openssl-dev build-essential pkg-config libjansson-dev fonts-roboto file"

          # Fedora family (independent from RHEL)
          - distro: "fedora:44"
            name: "Fedora 44"
            pre_install: "dnf update -y"
            install_deps: "dnf install -y sudo systemd cairo-devel libcurl-devel gcc make pkg-config jansson-devel google-roboto-fonts file"

          # RHEL/CentOS family (RHEL-compatible)
          - distro: "quay.io/centos/centos:stream9"
            name: "CentOS Stream 9 (RHEL 9 compatible)"
            pre_install: "dnf update -y && dnf install -y epel-release dnf-plugins-core && dnf config-manager --set-enabled crb && dnf makecache"
            install_deps: "dnf install -y sudo systemd cairo-devel libcurl-devel gcc make pkg-config jansson-devel google-roboto-fonts file"

          # openSUSE family
          - distro: "opensuse/tumbleweed"
            name: "openSUSE Tumbleweed"
            pre_install: "zypper --gpg-auto-import-keys refresh || true"
            install_deps: "zypper install -y tar sudo systemd cairo-devel libcurl-devel gcc make pkg-config libjansson-devel google-roboto-fonts file"

          - distro: "opensuse/leap:16.0"
            name: "openSUSE Leap 16.0"
            pre_install: "zypper --gpg-auto-import-keys refresh || true"
            install_deps: "zypper install -y sudo systemd cairo-devel libcurl-devel gcc make pkg-config libjansson-devel google-roboto-fonts file"

    container:
      image: ${{ matrix.distro }}
      options: --privileged # For systemctl and make install

    steps:
      - name: Checkout CoolerDash code
        uses: actions/checkout@v5

      - name: Update package manager
        run: ${{ matrix.pre_install }}

      - name: Install build dependencies
        run: ${{ matrix.install_deps }}

      - name: Test make install
        run: |
          echo "🚀 Testing 'make install' on ${{ matrix.name }}"

          # Create a safe install simulation
          # (since we're in a container, we can't test all systemd services)
          export DESTDIR=/tmp/install-test
          mkdir -p /tmp/install-test

          echo "Running make install with DESTDIR=/tmp/install-test"
          SUDO="" REALOS=no make install DESTDIR=/tmp/install-test || {
            echo "❌ make install failed"
            echo "Exit code: $?"
            echo "Checking if binary exists:"
            ls -la bin/coolerdash || echo "No binary found"
            echo "Checking source files:"
            ls -la etc/coolercontrol/plugins/coolerdash/ || echo "Source files not found"
            exit 1
          }

          # Check if all expected files were installed
          echo "📁 Checking installed files:"
          find /tmp/install-test -type f -name "*coolerdash*" | head -10

          # Check binary
          if [ -f "/tmp/install-test/usr/libexec/coolerdash/coolerdash" ]; then
            echo "✅ Binary installed correctly"
            file /tmp/install-test/usr/libexec/coolerdash/coolerdash
          else
            echo "❌ Binary not found at expected location"
            find /tmp/install-test -name "coolerdash" -type f
            exit 1
          fi

          # Check plugin files
          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/config.json" ]; then
            echo "✅ Config file installed (plugin mode)"
          else
            echo "❌ Config file not found"
            exit 1
          fi

          # Check manifest.toml
          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/manifest.toml" ]; then
            echo "✅ Plugin manifest installed"
          else
            echo "❌ Plugin manifest not found"
            exit 1
          fi

          # Check UI files
          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/ui/index.html" ]; then
            echo "✅ Plugin UI file installed"
          else
            echo "❌ Plugin UI file not found"
            exit 1
          fi

          # Check license file (Linux packaging standard)
          if [ -f "/tmp/install-test/usr/share/licenses/coolerdash/LICENSE" ]; then
            echo "✅ License file installed (/usr/share/licenses/)"
          else
            echo "❌ License file not found at /usr/share/licenses/coolerdash/"
            exit 1
          fi

          echo "✅ Installation test completed on ${{ matrix.name }}"

  # Additional test for Arch Linux (your development system)
  arch-install:
    name: Test on Arch Linux (Reference)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Arch Linux
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm cairo libcurl-gnutls gcc make pkg-config jansson ttf-roboto sudo systemd file

      - name: Test make install on Arch
        run: |
          echo "🚀 Testing 'make install' on Arch Linux (reference system)"

          export DESTDIR=/tmp/install-test
          mkdir -p /tmp/install-test
          SUDO="" REALOS=no make install DESTDIR=/tmp/install-test

          # Verify binary installation
          if [ -f "/tmp/install-test/usr/libexec/coolerdash/coolerdash" ]; then
            echo "✅ Binary installed"
            file /tmp/install-test/usr/libexec/coolerdash/coolerdash
          else
            echo "❌ Binary not found"
            find /tmp/install-test -name "coolerdash" -type f
            exit 1
          fi

          # Check plugin config
          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/config.json" ]; then
            echo "✅ Config file installed"
          else
            echo "❌ Config file not found"
            exit 1
          fi

          # Check license file (Arch packaging guideline)
          if [ -f "/tmp/install-test/usr/share/licenses/coolerdash/LICENSE" ]; then
            echo "✅ License file installed (/usr/share/licenses/)"
          else
            echo "❌ License file not found at /usr/share/licenses/coolerdash/"
            exit 1
          fi

          echo "✅ Arch Linux installation test completed (reference)"

  # Additional test for Gentoo with OpenRC
  gentoo-openrc-install:
    name: Test on Gentoo (OpenRC) (Reference)
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Gentoo OpenRC
        run: |
          emerge-webrsync || emerge --sync --quiet
          emerge --getbinpkg --usepkg --noreplace \
            virtual/pkgconfig \
            x11-libs/cairo \
            net-misc/curl \
            dev-libs/jansson \
            media-fonts/roboto \
            sys-apps/file \
            sys-apps/openrc

      - name: Verify Gentoo OpenRC detection
        run: |
          test -f /etc/gentoo-release
          command -v gcc
          command -v make
          command -v rc-service
          ! command -v systemctl
          test "$(make detect-distro)" = "gentoo"

      - name: Test make install on Gentoo OpenRC
        run: |
          echo "🚀 Testing 'make install' on Gentoo OpenRC"

          export DESTDIR=/tmp/install-test
          mkdir -p /tmp/install-test
          SUDO="" REALOS=yes make install DESTDIR=/tmp/install-test

          # Verify binary installation
          if [ -f "/tmp/install-test/usr/libexec/coolerdash/coolerdash" ]; then
            echo "✅ Binary installed"
            file /tmp/install-test/usr/libexec/coolerdash/coolerdash
          else
            echo "❌ Binary not found"
            find /tmp/install-test -name "coolerdash" -type f
            exit 1
          fi

          # Check plugin files
          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/config.json" ]; then
            echo "✅ Config file installed"
          else
            echo "❌ Config file not found"
            exit 1
          fi

          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/manifest.toml" ]; then
            echo "✅ Plugin manifest installed"
          else
            echo "❌ Plugin manifest not found"
            exit 1
          fi

          if [ -f "/tmp/install-test/var/lib/coolercontrol/plugins/coolerdash/ui/index.html" ]; then
            echo "✅ Plugin UI file installed"
          else
            echo "❌ Plugin UI file not found"
            exit 1
          fi

          # Check OpenRC can enumerate installed init scripts.
          rc-service --list >/dev/null

          echo "✅ Gentoo (OpenRC) installation test completed (reference)"

  # Summary report
  installation-summary:
    name: Multi-Distribution Installation Test Summary
    runs-on: ubuntu-latest
    needs: [make-install, arch-install, gentoo-openrc-install]
    if: always() # Runs even if tests fail

    steps:
      - name: Create summary report
        run: |
          echo "## 🚀 CoolerDash Multi-Distribution Installation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tested Distributions:" >> $GITHUB_STEP_SUMMARY
          echo "- **Ubuntu**: 26.04 LTS" >> $GITHUB_STEP_SUMMARY
          echo "- **Debian**: 13 (Trixie)" >> $GITHUB_STEP_SUMMARY
          echo "- **Fedora**: 44" >> $GITHUB_STEP_SUMMARY
          echo "- **RHEL-compatible**: CentOS Stream 9" >> $GITHUB_STEP_SUMMARY
          echo "- **openSUSE**: Tumbleweed, Leap 16.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Arch Linux**: Latest (reference)" >> $GITHUB_STEP_SUMMARY
          echo "- **Gentoo**: Latest (reference)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Coverage:" >> $GITHUB_STEP_SUMMARY
          echo "✅ Installation process (make install)" >> $GITHUB_STEP_SUMMARY
          echo "✅ File placement verification" >> $GITHUB_STEP_SUMMARY
          echo "✅ System init detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **View detailed logs above for distribution-specific results**" >> $GITHUB_STEP_SUMMARY
